<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script>
  const SERVER_ROOT = "https://thumbtherapy-server-production.up.railway.app";
  const APPROVE_URL = SERVER_ROOT + "/approve";
  const COMPLETE_URL = SERVER_ROOT + "/complete";

  // 테스트 중이면 true 유지
  const PI_SANDBOX = true;

  let currentPiUsd = 0.27;
  let currentUsdKrw = 1500;
  let accessToken = null;
  let currentUser = null;

  const products = [
    {
      id: "thumb-001",
      brand: "노라보데",
      name: "옥시젠 리페어 세럼",
      desc: "산소 테라피 기반의 집중 보습 세럼 테스트 상품입니다.",
      krw: 10000
    },
    {
      id: "thumb-002",
      brand: "알케미아",
      name: "밸런싱 크림",
      desc: "피부 균형 케어를 위한 데일리 크림 테스트 상품입니다.",
      krw: 18000
    },
    {
      id: "thumb-003",
      brand: "기노",
      name: "하이드라 마스크",
      desc: "수분 공급 중심의 마스크 테스트 상품입니다.",
      krw: 22000
    },
    {
      id: "thumb-004",
      brand: "쏘티스",
      name: "클렌징 밀크",
      desc: "부드러운 데일리 클렌징 테스트 상품입니다.",
      krw: 15000
    }
  ];

  function showMessage(text, type = "ok") {
    const box = document.getElementById("messageBox");
    box.className = "message " + type;
    box.textContent = text;
  }

  function clearMessage() {
    const box = document.getElementById("messageBox");
    box.className = "message";
    box.textContent = "";
  }

  function formatKrw(n) {
    return "₩" + Number(n).toLocaleString("ko-KR");
  }

  function formatUsd(n) {
    return "$" + Number(n).toFixed(2);
  }

  function formatPi(n) {
    return Number(n).toFixed(4) + " PI";
  }

  function calcUsdFromKrw(krw) {
    return krw / currentUsdKrw;
  }

  function calcPiFromKrw(krw) {
    return calcUsdFromKrw(krw) / currentPiUsd;
  }

  async function fetchExchangeRate() {
    try {
      const res = await fetch("https://open.er-api.com/v6/latest/USD");
      const data = await res.json();
      if (data && data.rates && data.rates.KRW) {
        currentUsdKrw = Number(data.rates.KRW);
      }
    } catch (e) {
      console.error("환율 조회 실패:", e);
    }
  }

  function renderProducts() {
    const grid = document.getElementById("productGrid");
    grid.innerHTML = "";

    for (const p of products) {
      const usd = calcUsdFromKrw(p.krw);
      const pi = calcPiFromKrw(p.krw);

      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="card-brand">${p.brand}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-desc">${p.desc}</div>
        <div class="price-box">
          <div class="krw">${formatKrw(p.krw)}</div>
          <div class="usd">약 ${formatUsd(usd)}</div>
          <div class="pi">약 ${formatPi(pi)}</div>
        </div>
        <div class="btn-row">
          <button class="btn-main" onclick="payProduct('${p.id}')">Pi 결제하기</button>
          <button class="btn-soft" onclick="testServer()">서버 연결 확인</button>
        </div>
      `;
      grid.appendChild(card);
    }
  }

  async function testServer() {
    clearMessage();
    try {
      const res = await fetch(SERVER_ROOT, { method: "GET" });
      const text = await res.text();
      showMessage("서버 연결 성공: " + text, "ok");
    } catch (e) {
      showMessage("서버 연결 실패: " + (e.message || e), "error");
    }
  }

  async function authenticatePi() {
    if (!window.Pi) {
      showMessage("Pi Browser에서 열어야 합니다.", "error");
      return false;
    }

    try {
      Pi.init({
        version: "2.0",
        sandbox: PI_SANDBOX
      });

      const scopes = ["payments", "username"];
      const auth = await Pi.authenticate(
        scopes,
        function onIncompletePaymentFound(payment) {
          console.log("미완료 결제 발견:", payment);
        }
      );

      accessToken = auth.accessToken;
      currentUser = auth.user ? auth.user.username : null;

      console.log("Pi 인증 성공:", currentUser);
      return true;
    } catch (e) {
      console.error("Pi.authenticate 오류:", e);
      showMessage("Pi 인증 실패: " + (e.message || JSON.stringify(e)), "error");
      return false;
    }
  }

  async function postJSON(url, payload) {
    const res = await fetch(url, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    const text = await res.text();
    let data;
    try {
      data = JSON.parse(text);
    } catch {
      data = { raw: text };
    }

    if (!res.ok) {
      throw new Error(data.error || data.message || ("HTTP " + res.status));
    }

    return data;
  }

  async function payProduct(productId) {
    clearMessage();

    const product = products.find(p => p.id === productId);
    if (!product) {
      showMessage("상품 정보가 없습니다.", "error");
      return;
    }

    const ok = await authenticatePi();
    if (!ok) return;

    const piAmount = Number(calcPiFromKrw(product.krw).toFixed(4));
    if (!piAmount || Number.isNaN(piAmount) || piAmount <= 0) {
      showMessage("PI 결제 금액 계산 실패", "error");
      return;
    }

    showMessage("결제창 준비 중...", "ok");

    try {
      Pi.createPayment(
        {
          amount: piAmount,
          memo: `${product.name} 결제`,
          metadata: {
            productId: product.id,
            productName: product.name,
            user: currentUser || "guest"
          }
        },
        {
          onReadyForServerApproval: async function(paymentId) {
            try {
              showMessage("승인 요청 중...", "ok");
              const result = await postJSON(APPROVE_URL, {
                paymentId,
                accessToken
              });
              console.log("approve 결과:", result);
              showMessage("승인 완료", "ok");
            } catch (err) {
              console.error("approve 실패:", err);
              showMessage("승인 실패: " + (err.message || err), "error");
            }
          },

          onReadyForServerCompletion: async function(paymentId, txid) {
            try {
              showMessage("결제 완료 처리 중...", "ok");
              const result = await postJSON(COMPLETE_URL, {
                paymentId,
                txid,
                accessToken
              });
              console.log("complete 결과:", result);
              showMessage("결제가 완료되었습니다.", "ok");
            } catch (err) {
              console.error("complete 실패:", err);
              showMessage("완료 처리 실패: " + (err.message || err), "error");
            }
          },

          onCancel: function(paymentId) {
            console.log("결제 취소:", paymentId);
            showMessage("결제가 취소되었습니다.", "error");
          },

          onError: function(error, payment) {
            console.error("Pi 결제 오류:", error, payment);
            showMessage(
              "결제 오류: " + ((error && error.message) || JSON.stringify(error)),
              "error"
            );
          }
        }
      );
    } catch (e) {
      console.error("Pi.createPayment 오류:", e);
      showMessage("결제창 실행 실패: " + (e.message || e), "error");
    }
  }

  (async function init() {
    await fetchExchangeRate();
    renderProducts();
    await testServer();
  })();
</script>
