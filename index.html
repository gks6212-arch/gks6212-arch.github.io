<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>더썸테라피 | 프리미엄 뷰티 스토어</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#f6f3ef;
}

/* 헤더 */
.header {
    background:#fff;
    padding:15px;
    font-weight:bold;
    font-size:20px;
}

/* 브랜드 메뉴 */
.menu {
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:10px;
    background:#fff;
}

.menu button {
    padding:8px 15px;
    border:none;
    background:#ddd;
    border-radius:20px;
    cursor:pointer;
}

/* 섹션 */
.section {
    padding:20px;
}

.title {
    font-size:22px;
    font-weight:bold;
    margin-bottom:15px;
}

/* 상품 카드 */
.grid {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
}

.card {
    background:#fff;
    padding:15px;
    border-radius:15px;
}

.price {
    color:#999;
}

.pi {
    color:#8a2be2;
    font-weight:bold;
}
</style>

<script>
function go(id){
    document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

function calcPi(price){
    const piRate = 215; // 임시 PI 시세
    return (price / piRate).toFixed(2);
}
</script>

</head>

<body>

<div class="header">더썸테라피</div>

<!-- 브랜드 메뉴 -->
<div class="menu">
<button onclick="go('nora')">노라보데</button>
<button onclick="go('alchemia')">알케미아</button>
<button onclick="go('guinot')">기노</button>
<button onclick="go('thala')">탈라</button>
<button onclick="go('sothys')">쏘티스</button>
</div>

<!-- ===================== -->
<!-- 노라보데 -->
<div class="section" id="nora">
<div class="title">노라보데</div>
<div class="grid">

<script>
for(let i=1;i<=10;i++){
    let price = 120000 + i*10000;
    document.write(`
    <div class="card">
        <div>노라보데 제품 ${i}</div>
        <div class="price">₩${price.toLocaleString()}</div>
        <div class="pi">π ${calcPi(price)}</div>
    </div>
    `);
}
</script>

</div>
</div>

<!-- ===================== -->
<!-- 알케미아 -->
<div class="section" id="alchemia">
<div class="title">알케미아</div>
<div class="grid">

<script>
for(let i=1;i<=10;i++){
    let price = 130000 + i*10000;
    document.write(`
    <div class="card">
        <div>알케미아 제품 ${i}</div>
        <div class="price">₩${price.toLocaleString()}</div>
        <div class="pi">π ${calcPi(price)}</div>
    </div>
    `);
}
</script>

</div>
</div>

<!-- ===================== -->
<!-- 기노 -->
<div class="section" id="guinot">
<div class="title">기노</div>
<div class="grid">

<script>
for(let i=1;i<=10;i++){
    let price = 140000 + i*10000;
    document.write(`
    <div class="card">
        <div>기노 제품 ${i}</div>
        <div class="price">₩${price.toLocaleString()}</div>
        <div class="pi">π ${calcPi(price)}</div>
    </div>
    `);
}
</script>

</div>
</div>

<!-- ===================== -->
<!-- 탈라 -->
<div class="section" id="thala">
<div class="title">탈라</div>
<div class="grid">

<script>
for(let i=1;i<=10;i++){
    let price = 150000 + i*10000;
    document.write(`
    <div class="card">
        <div>탈라 제품 ${i}</div>
        <div class="price">₩${price.toLocaleString()}</div>
        <div class="pi">π ${calcPi(price)}</div>
    </div>
    `);
}
</script>

</div>
</div>

<!-- ===================== -->
<!-- 쏘티스 -->
<div class="section" id="sothys">
<div class="title">쏘티스</div>
<div class="grid">

<script>
for(let i=1;i<=10;i++){
    let price = 160000 + i*10000;
    document.write(`
    <div class="card">
        <div>쏘티스 제품 ${i}</div>
        <div class="price">₩${price.toLocaleString()}</div>
        <div class="pi">π ${calcPi(price)}</div>
    </div>
    `);
}
</script>

</div>
</div>

</body>
</html>
