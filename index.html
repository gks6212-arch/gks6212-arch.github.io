<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Thumb Therapy</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f6f1eb;
  color:#333;
}
.header{
  padding:20px;
  display:flex;
  align-items:center;
}
.logo{
  width:60px;height:60px;
  background:#b89a6b;
  border-radius:15px;
  margin-right:10px;
}
.notice{
  background:#fff3cd;
  padding:15px;
  margin:10px;
  border-radius:10px;
}
.brand-tabs{
  display:flex;
  overflow:auto;
  gap:10px;
  padding:10px;
}
.brand-tabs button{
  padding:10px 15px;
  border:none;
  border-radius:20px;
  background:#eee;
}
.products{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}
.card{
  background:white;
  border-radius:15px;
  padding:10px;
}
.admin-btn{
  position:fixed;
  right:15px;
  bottom:15px;
  background:#8a6a3f;
  color:white;
  border:none;
  border-radius:50%;
  width:60px;height:60px;
}
.hidden{display:none;}
</style>
</head>

<body>

<div class="header">
  <div class="logo"></div>
  <div>
    <h2>The Thumb Therapy</h2>
    <small>Preparation Stage · Domain Verification</small>
  </div>
</div>

<div class="notice">
⚠ 현재 도메인 인증 및 오픈 준비중입니다.<br>
전화/카톡 상담 및 결제 기능은 비활성 상태입니다.
</div>

<div class="brand-tabs" id="tabs"></div>

<div class="products" id="products"></div>

<button class="admin-btn" onclick="adminLogin()">관리자</button>

<script>
let PI_PRICE = 0.6; // 임시 시세

async function getPrice(){
  try{
    let res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=pi-network&vs_currencies=usd");
    let data = await res.json();
    PI_PRICE = data["pi-network"].usd;
  }catch(e){}
}
getPrice();

let data = JSON.parse(localStorage.getItem("shop")||"{}");

if(Object.keys(data).length===0){
  data={
    "노라보데":[
      {name:"앰플 세럼",price:180000},
      {name:"수분 에센스",price:150000}
    ],
    "알케미아":[
      {name:"리페어 크림",price:200000}
    ],
    "기노":[
      {name:"아쿠아 크림",price:170000}
    ],
    "탈라":[
      {name:"마린 세럼",price:190000}
    ],
    "쏘티스":[
      {name:"에센셜 크림",price:210000}
    ]
  }
}

function save(){
  localStorage.setItem("shop",JSON.stringify(data));
}

function renderTabs(){
  let html="";
  Object.keys(data).forEach(b=>{
    html+=`<button onclick="show('${b}')">${b}</button>`;
  })
  document.getElementById("tabs").innerHTML=html;
}
renderTabs();

function show(brand){
  let html="";
  data[brand].forEach((p,i)=>{
    let pi=(p.price/(PI_PRICE*1300)).toFixed(2);
    html+=`
    <div class="card">
      <h4>${brand} ${p.name}</h4>
      <div>₩${p.price.toLocaleString()}</div>
      <div>π ${pi}</div>
      <button onclick="buy('${brand}',${i})">Pi 결제</button>
    </div>`;
  })
  document.getElementById("products").innerHTML=html;
}
show("노라보데");

function buy(b,i){
  alert("Pi 결제 기능은 오픈 후 활성화됩니다");
}

function adminLogin(){
  let pw=prompt("비밀번호 입력");
  if(pw==="1234"){
    adminMode();
  }
}

function adminMode(){
  let brand=prompt("브랜드 입력");
  let name=prompt("상품명");
  let price=parseInt(prompt("가격"));

  if(!data[brand]) data[brand]=[];
  data[brand].push({name,price});
  save();
  renderTabs();
  show(brand);
}
</script>

</body>
</html>
